version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rwa_steering
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rwa_steering"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY}/backend:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      RWA_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rwa_steering"
      RWA_CORS_ORIGINS: "https://${DOMAIN}"
      RWA_LOG_LEVEL: WARNING
      RWA_ENV: production
      RWA_AGENTS_LLM_PROVIDER: ${RWA_AGENTS_LLM_PROVIDER:-deterministic}
      RWA_LANGFUSE_ENABLED: ${RWA_LANGFUSE_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_APIKEY: ${WATSONX_APIKEY:-}
      WATSONX_URL: ${WATSONX_URL:-https://eu-de.ml.cloud.ibm.com}
      RWA_AGENTS_WATSONX_MODEL_ID: ${RWA_AGENTS_WATSONX_MODEL_ID:-meta-llama/llama-3-3-70b-instruct}
      RWA_AGENTS_WATSONX_API_VERSION: ${RWA_AGENTS_WATSONX_API_VERSION:-2024-03-14}
      RWA_AGENTS_WATSONX_MAX_NEW_TOKENS: ${RWA_AGENTS_WATSONX_MAX_NEW_TOKENS:-2048}
      RWA_AGENTS_WATSONX_TIME_LIMIT: ${RWA_AGENTS_WATSONX_TIME_LIMIT:-60000}
      RWA_AGENTS_WATSONX_HTTP_TIMEOUT: ${RWA_AGENTS_WATSONX_HTTP_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ${REGISTRY}/frontend:${IMAGE_TAG}
    restart: unless-stopped
    # Only accessible from host nginx — not exposed to internet directly
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
