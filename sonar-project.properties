sonar.projectKey=risk-trace-control-tower
sonar.projectName=RWA Control Tower
sonar.projectVersion=1.0

sonar.sources=apps/backend/src,apps/frontend/src
sonar.tests=apps/backend/tests
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/*.pyc,**/dist/**,**/build/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=apps/backend/coverage.xml
sonar.python.ruff.reportPaths=apps/backend/ruff-report.json
sonar.python.bandit.reportPaths=apps/backend/bandit-report.json

sonar.javascript.lcov.reportPaths=apps/frontend/coverage/lcov.info

sonar.qualitygate.wait=true

# Regulatory quality gates — Basel III / DORA
sonar.coverage.exclusions=**/migrations/**,**/conftest.py,**/settings.py
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=apps/backend/src/**/seed*.py
