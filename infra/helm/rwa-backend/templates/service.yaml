apiVersion: v1
kind: Service
metadata:
  name: rwa-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rwa-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "rwa-backend.selectorLabels" . | nindent 4 }}
