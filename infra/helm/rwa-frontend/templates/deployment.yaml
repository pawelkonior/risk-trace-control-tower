apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rwa-frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rwa-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rwa-frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rwa-frontend.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx default non-root user
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: rwa-frontend
        image: "{{ .Values.global.registry }}/{{ .Values.image.repository }}:{{ .Values.global.imageTag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 80  # nginx — NOT 3000 or 5173
          protocol: TCP
        # No NEXT_PUBLIC_* env vars — Vite bakes API URL at build time
        livenessProbe:
          httpGet:
            path: /health  # NOT /v1/health — that is backend only
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      volumes:
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
