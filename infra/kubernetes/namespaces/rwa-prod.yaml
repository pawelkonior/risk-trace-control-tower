apiVersion: v1
kind: Namespace
metadata:
  name: rwa-prod
  labels:
    environment: prod
    team: rwa
    regulatory: bcbs239-dora
    kubernetes.io/metadata.name: rwa-prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: rwa-prod-quota
  namespace: rwa-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: rwa-prod-limitrange
  namespace: rwa-prod
spec:
  limits:
  - type: Container
    default:
      cpu: "2"
      memory: 2Gi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
