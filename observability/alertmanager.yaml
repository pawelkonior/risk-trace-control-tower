global:
  resolve_timeout: 5m
  slack_api_url: "{{ SLACK_API_URL }}"

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: default
  group_by: [alertname, team, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
        page: "true"
      receiver: oncall-pagerduty
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: critical
      receiver: slack-oncall
      group_wait: 10s
      repeat_interval: 2h

    - match:
        regulatory: bcbs239-dora
      receiver: slack-compliance
      group_wait: 30s
      repeat_interval: 6h
      continue: true

    - match:
        severity: warning
      receiver: slack-warning
      repeat_interval: 6h

receivers:
  - name: default
    slack_configs:
      - channel: "#rwa-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: slack-oncall
    slack_configs:
      - channel: "#rwa-oncall"
        send_resolved: true
        title: ':fire: CRITICAL: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: "danger"

  - name: slack-compliance
    slack_configs:
      - channel: "#rwa-compliance"
        send_resolved: true
        title: ':scales: REGULATORY ALERT: {{ template "slack.title" . }}'
        text: |
          *Framework*: Basel III / BCBS 239 / DORA
          {{ template "slack.text" . }}
        color: "warning"

  - name: slack-warning
    slack_configs:
      - channel: "#rwa-alerts"
        send_resolved: true
        title: ':warning: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: "warning"

  - name: oncall-pagerduty
    pagerduty_configs:
      - service_key: "{{ PAGERDUTY_SERVICE_KEY }}"
        description: '{{ template "pagerduty.description" . }}'
        severity: critical

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, team]
