receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: rwa-calculator
          scrape_interval: 30s
          static_configs:
            - targets: ["rwa-platform-rwa-backend.rwa-prod.svc.cluster.local:8000"]
          metrics_path: /metrics

        - job_name: redis-exporter
          scrape_interval: 30s
          static_configs:
            - targets: ["redis-exporter.monitoring.svc.cluster.local:9121"]

        - job_name: postgres-exporter
          scrape_interval: 30s
          static_configs:
            - targets: ["postgres-exporter.monitoring.svc.cluster.local:9187"]

        - job_name: kafka-exporter
          scrape_interval: 30s
          static_configs:
            - targets: ["kafka-exporter.monitoring.svc.cluster.local:9308"]

        - job_name: nginx-ingress
          scrape_interval: 30s
          static_configs:
            - targets: ["ingress-nginx-controller-metrics.ingress-nginx.svc.cluster.local:10254"]

        - job_name: kube-state-metrics
          scrape_interval: 30s
          static_configs:
            - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]

        - job_name: node-exporter
          scrape_interval: 30s
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - source_labels: [__address__]
              regex: "(.+):.*"
              target_label: __address__
              replacement: "${1}:9100"

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  memory_limiter:
    limit_mib: 256
    spike_limit_mib: 64
    check_interval: 5s

  resource:
    attributes:
      - key: deployment.environment
        from_attribute: service.namespace
        action: insert
      - key: service.cluster
        value: rwa-control-tower
        action: insert

  filter/drop-health:
    traces:
      span:
        - 'attributes["http.target"] == "/v1/health"'
        - 'attributes["http.target"] == "/health"'

exporters:
  prometheus:
    endpoint: "0.0.0.0:9464"
    namespace: rwa

  otlp/tempo:
    endpoint: tempo.monitoring.svc.cluster.local:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    labels:
      resource:
        service.name: "service_name"
        service.namespace: "namespace"
        deployment.environment: "environment"

  logging:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/drop-health, batch, resource]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [loki]
