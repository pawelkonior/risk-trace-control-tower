name: IaC Validate

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "docker/**"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - "docker/**"

env:
  TF_VERSION: "1.9.0"

jobs:
  terraform:
    name: "Terraform: fmt + validate + Checkov + trivy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: terraform init
        working-directory: infra/terraform/environments/prod
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform/environments/prod
        run: terraform validate

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/environments/prod
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_7,CKV_AWS_144

      - name: tfsec (trivy config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/terraform/environments/prod
          exit-code: "1"
          severity: HIGH,CRITICAL

  dockerfile-lint:
    name: "Docker: Hadolint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/backend/Dockerfile
          failure-threshold: warning

      - name: Hadolint — frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/frontend/Dockerfile
          failure-threshold: warning
