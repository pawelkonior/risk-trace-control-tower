name: IaC Validate

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "docker/**"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - "docker/**"

env:
  TF_VERSION: "1.9.0"

jobs:
  terraform:
    name: "Terraform: fmt + validate + plan + Checkov + tfsec"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: terraform init
        working-directory: infra/terraform/environments/prod
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform/environments/prod
        run: terraform validate

      - name: terraform plan
        working-directory: infra/terraform/environments/prod
        run: |
          terraform plan -detailed-exitcode -out=tfplan \
            -var="env=prod" \
            -var="aws_region=${{ secrets.AWS_REGION }}" || EXIT=$?
          if [ "${EXIT:-0}" -eq 1 ]; then exit 1; fi
        env:
          TF_LOG: WARN

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/environments/prod
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_7,CKV_AWS_144

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra/terraform/environments/prod

  dockerfile-lint:
    name: "Docker: Hadolint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/backend/Dockerfile
          failure-threshold: warning

      - name: Hadolint — frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/frontend/Dockerfile
          failure-threshold: warning
