name: Security Gates — DAST + Performance

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (default: staging)"
        required: false
        default: ""
      run_stress:
        description: "Run stress test (true/false)"
        required: false
        default: "false"

env:
  STAGING_URL: ${{ secrets.STAGING_URL }}

jobs:
  zap-baseline:
    name: OWASP ZAP — baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url || env.STAGING_URL }}
          rules_file_name: .github/zap-rules.tsv
          cmd_options: >-
            -l HIGH
            -z "-config scanner.threadPerHost=5"
          fail_action: true

      - name: Upload ZAP baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html

  zap-active:
    name: OWASP ZAP — active scan
    runs-on: ubuntu-latest
    needs: zap-baseline
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: ZAP full active scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ inputs.target_url || env.STAGING_URL }}
          rules_file_name: .github/zap-rules.tsv
          cmd_options: >-
            -l HIGH
          fail_action: true

      - name: Upload ZAP active report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-active-report
          path: report_html.html

  k6-smoke:
    name: k6 — smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/smoke-test.js
          flags: --out json=k6-smoke-results.json
        env:
          TARGET_URL: ${{ inputs.target_url || env.STAGING_URL }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: |
            k6-smoke-results.json
            k6-smoke-summary.json

  k6-load:
    name: k6 — load test (SLO gate)
    runs-on: ubuntu-latest
    needs: k6-smoke
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/load-test.js
          flags: >-
            --out json=k6-load-results.json
            --out influxdb=${{ secrets.K6_INFLUXDB_URL }}
        env:
          TARGET_URL: ${{ inputs.target_url || env.STAGING_URL }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      - name: Validate SLO thresholds
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("k6-load-summary.json") as f:
              data = json.load(f)

          metrics = data.get("metrics", {})
          p95 = metrics.get("http_req_duration", {}).get("values", {}).get("p(95)", 0)
          error_rate = metrics.get("http_req_failed", {}).get("values", {}).get("rate", 1)

          print(f"p(95) latency: {p95:.2f}ms (SLO: <2000ms)")
          print(f"Error rate:    {error_rate*100:.3f}% (SLO: <1%)")

          failures = []
          if p95 > 2000:
              failures.append(f"p95 {p95:.0f}ms exceeds 2000ms SLO")
          if error_rate > 0.01:
              failures.append(f"Error rate {error_rate*100:.2f}% exceeds 1% SLO")

          if failures:
              print("\nSLO VIOLATIONS:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          else:
              print("\nAll SLO thresholds met.")
          EOF

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-results
          path: |
            k6-load-results.json
            k6-load-summary.json

  k6-stress:
    name: k6 — stress test (breaking point)
    runs-on: ubuntu-latest
    needs: k6-load
    if: inputs.run_stress == 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: k6 stress test
        uses: grafana/k6-action@v0.3.1
        continue-on-error: true
        with:
          filename: k6/stress-test.js
          flags: --out json=k6-stress-results.json
        env:
          TARGET_URL: ${{ inputs.target_url || env.STAGING_URL }}

      - name: Upload stress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-stress-results
          path: |
            k6-stress-results.json
            k6-stress-summary.json

  dependency-audit:
    name: Dependency audit — pip-audit + OWASP DC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Export manifest
        working-directory: apps/backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - name: pip-audit
        working-directory: apps/backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json -o pip-audit.json
          pip-audit -r requirements.txt

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "risk-trace-control-tower"
          path: "apps/backend"
          format: "HTML,JSON"
          out: "owasp-reports"
          args: >
            --enableRetired
            --failOnCVSS 7
            --suppression .github/owasp-suppressions.xml

      - name: Upload dependency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            apps/backend/pip-audit.json
            owasp-reports/

  container-scan:
    name: Trivy — container scan (HIGH+CRITICAL)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REGISTRY }}/backend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REGISTRY }}/frontend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
