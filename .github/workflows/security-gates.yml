name: Security Gates — DAST

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for ZAP scan"
        required: false
        default: ""

env:
  STAGING_URL: ${{ secrets.STAGING_URL }}

jobs:
  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url || env.STAGING_URL }}
          rules_file_name: .github/zap-rules.tsv
          cmd_options: >-
            -l HIGH
            -z "-config scanner.threadPerHost=5"
          fail_action: true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html

  zap-active:
    name: ZAP active scan
    runs-on: ubuntu-latest
    needs: zap-baseline
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: ZAP full active scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ inputs.target_url || env.STAGING_URL }}
          rules_file_name: .github/zap-rules.tsv
          cmd_options: >-
            -l HIGH
          fail_action: true

      - name: Upload ZAP active report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-active-report
          path: report_html.html

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: pip-audit
        working-directory: apps/backend
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          pip install pip-audit
          pip-audit -r requirements.txt --format json -o pip-audit.json
          pip-audit -r requirements.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: apps/backend/pip-audit.json

  container-scan:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan — backend (HIGH+CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REGISTRY }}/backend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy scan — frontend (HIGH+CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REGISTRY }}/frontend:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
