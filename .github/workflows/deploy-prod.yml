name: Deploy — prod (manual re-deploy / rollback)

# Use this to deploy a specific SHA or roll back.
# Normal deploys happen automatically via ci.yml on push to main.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA to deploy (leave blank = latest main)"
        required: false
        type: string
      confirm:
        description: "Type DEPLOY to confirm"
        required: true
        type: string

jobs:
  deploy:
    name: "Manual deploy: ${{ inputs.image_tag || 'latest' }}"
    runs-on: ubuntu-latest
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - name: Validate
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "Must type DEPLOY to confirm"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve tag (default to latest main SHA)
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "${TAG}" ]; then
            TAG=$(git rev-parse HEAD)
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "/opt/rwa/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/rwa

            grep IMAGE_TAG .env | cut -d= -f2 > /tmp/prev-image-tag || true

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ steps.tag.outputs.tag }}|" .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            for i in $(seq 1 18); do
              docker compose -f docker-compose.prod.yml exec -T backend \
                curl -sf http://localhost:8000/v1/health > /dev/null 2>&1 && break
              [ "$i" -eq 18 ] && { echo "Health check failed"; exit 1; }
              sleep 10
            done
            echo "Deploy OK: ${{ steps.tag.outputs.tag }}"

      - name: Smoke test
        run: |
          curl -f --retry 5 --retry-delay 5 \
            https://${{ secrets.DOMAIN }}/api/v1/health

      - name: Evidence → S3
        if: always()
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          echo "{\"timestamp\":\"${TS}\",\"sha\":\"${{ steps.tag.outputs.tag }}\",\"actor\":\"${{ github.actor }}\",\"trigger\":\"manual\",\"status\":\"${{ job.status }}\"}" \
            | aws s3 cp - \
                s3://${{ secrets.COMPLIANCE_EVIDENCE_BUCKET }}/deployments/prod/${TS}.json \
                --no-progress
