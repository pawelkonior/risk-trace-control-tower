name: Deploy — prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA of images to deploy"
        required: true
        type: string
      confirm:
        description: "Type DEPLOY to confirm"
        required: true
        type: string

# required-reviewers: 2 — set in GitHub environment "prod" settings

jobs:
  pre-flight:
    name: Pre-flight validation
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation token
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "Confirmation must be exactly 'DEPLOY'"
            exit 1
          fi

      - name: Verify CI passed for this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api \
            /repos/${{ github.repository }}/commits/${{ inputs.image_tag }}/check-runs \
            --jq '[.check_runs[] | select(.name == "Build: backend image → ECR")] | .[0].conclusion')
          echo "CI status for ${{ inputs.image_tag }}: ${STATUS}"
          if [ "${STATUS}" != "success" ]; then
            echo "CI has not passed for this SHA — refusing deploy"
            exit 1
          fi

  deploy:
    name: "Deploy to prod (Docker Compose)"
    runs-on: ubuntu-latest
    needs: pre-flight
    environment:
      name: prod
      url: https://${{ secrets.DOMAIN }}
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Record pre-deploy image tag
        id: pre-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            grep IMAGE_TAG /opt/rwa/.env | cut -d= -f2 || echo "unknown"

      - name: Deploy — docker compose pull + up
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY
          script: |
            set -euo pipefail
            cd /opt/rwa

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Update image tag
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ inputs.image_tag }}/" .env

            # Pull new images (zero-downtime: pull before stopping old)
            docker compose -f docker-compose.prod.yml pull

            # Bring up new containers
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health
            echo "Waiting for backend..."
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.prod.yml exec backend \
                  curl -sf http://localhost:8000/v1/health > /dev/null 2>&1; then
                echo "Backend healthy."
                break
              fi
              sleep 5
            done

            # Final health check
            curl -f http://localhost/health || exit 1
            echo "Deploy complete: ${{ inputs.image_tag }}"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          REGISTRY: ${{ secrets.ECR_REGISTRY }}

      - name: Smoke test /v1/health via public URL
        run: |
          curl -f --retry 5 --retry-delay 5 \
            https://${{ secrets.DOMAIN }}/api/v1/health

      - name: Upload deployment evidence to S3 WORM
        if: always()
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          cat > /tmp/deploy-evidence.json <<EOF
          {
            "timestamp": "${TS}",
            "environment": "prod",
            "image_tag": "${{ inputs.image_tag }}",
            "deployed_by": "${{ github.actor }}",
            "workflow_run": "${{ github.run_id }}",
            "outcome": "${{ job.status }}"
          }
          EOF
          aws s3 cp /tmp/deploy-evidence.json \
            s3://${{ secrets.COMPLIANCE_EVIDENCE_BUCKET }}/deployments/prod/${TS}.json \
            --no-progress

  rollback:
    name: Rollback (on failure)
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Rollback to previous image tag
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/rwa
            echo "Rolling back..."
            git stash || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Rollback complete."
