name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"
  REGISTRY: ${{ secrets.ECR_REGISTRY }}

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline: test → quality → supply-chain → sast → build → sbom
# Backend must pass SonarQube Quality Gate + OWASP DC before Docker push.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. TEST ───────────────────────────────────────────────────────────────
  backend-test:
    name: "Test: backend (uv + pytest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check . --output-format=json > ruff-report.json || uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: pytest + coverage
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term

      - uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            apps/backend/coverage.xml
            apps/backend/ruff-report.json

  frontend-test:
    name: "Test: frontend (tsc + playwright)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Playwright install
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run test:e2e
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/

  # ── 2. CODE QUALITY — SonarQube ──────────────────────────────────────────
  sonarqube:
    name: "Quality: SonarQube + Quality Gate"
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: backend-reports
          path: apps/backend/

      - name: Bandit (imported by SonarQube)
        run: |
          pip install bandit
          bandit -r apps/backend/src/ -ll -f json -o apps/backend/bandit-report.json || true

      - uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=apps/backend/coverage.xml
            -Dsonar.python.bandit.reportPaths=apps/backend/bandit-report.json
            -Dsonar.python.ruff.reportPaths=apps/backend/ruff-report.json

      - name: Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── 3. SUPPLY CHAIN ───────────────────────────────────────────────────────
  sonatype-nexus-iq:
    name: "Supply Chain: Sonatype Nexus IQ"
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export dependency manifest
        working-directory: apps/backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - uses: sonatype-nexus-community/nexus-iq-github-action@main
        with:
          serverUrl: ${{ secrets.NEXUS_IQ_URL }}
          username: ${{ secrets.NEXUS_IQ_USERNAME }}
          password: ${{ secrets.NEXUS_IQ_PASSWORD }}
          applicationId: risk-trace-control-tower
          stage: BUILD
          target: apps/backend/requirements.txt

  owasp-dependency-check:
    name: "Supply Chain: OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export manifest
        working-directory: apps/backend
        run: uv pip compile pyproject.toml -o requirements.txt

      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "risk-trace-control-tower"
          path: "apps/backend"
          format: "ALL"
          out: "owasp-reports"
          args: >
            --enableRetired
            --failOnCVSS 7
            --suppression .github/owasp-suppressions.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: owasp-reports/

  # ── 4. SAST + SECRETS ─────────────────────────────────────────────────────
  sast:
    name: "SAST: Semgrep + Bandit + Gitleaks + TruffleHog"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep — OWASP Top 10 + FastAPI + secrets
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/fastapi
            p/sql-injection
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Bandit — CWE Top 25
        run: |
          pip install bandit
          bandit -r apps/backend/src/ -ll -f json -o bandit-report.json
          bandit -r apps/backend/src/ -ll

      - name: Gitleaks — secrets in history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog — verified secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: bandit-report.json

  # ── 5. IaC SECURITY ───────────────────────────────────────────────────────
  iac-security:
    name: "IaC: Checkov + tfsec"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Checkov — Terraform + Docker
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/environments/prod
          framework: terraform,dockerfile
          soft_fail: false
          skip_check: CKV_AWS_7,CKV_AWS_144

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1
        with:
          working_directory: infra/terraform/environments/prod

  # ── 6. BUILD + CONTAINER SCAN ─────────────────────────────────────────────
  backend-build:
    name: "Build: backend image → ECR"
    runs-on: ubuntu-latest
    needs: [backend-test, sonarqube, owasp-dependency-check, sast]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ env.REGISTRY }}/backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git.commit=${{ github.sha }}
            build.run=${{ github.run_id }}

      - name: Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-backend.sarif

  frontend-build:
    name: "Build: frontend image → ECR"
    runs-on: ubuntu-latest
    needs: [frontend-test, sast]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          tags: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git.commit=${{ github.sha }}
            build.run=${{ github.run_id }}

      - name: Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

  # ── 7. SBOM ───────────────────────────────────────────────────────────────
  sbom:
    name: "SBOM: CycloneDX → S3 WORM"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: SBOM — backend
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json

      - name: SBOM — frontend
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-frontend.cdx.json

      - name: Upload SBOMs to S3 WORM
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          for f in sbom-backend.cdx.json sbom-frontend.cdx.json; do
            aws s3 cp $f \
              s3://${{ secrets.COMPLIANCE_EVIDENCE_BUCKET }}/sbom/${{ github.sha }}/${f} \
              --no-progress
          done

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "*.cdx.json"
