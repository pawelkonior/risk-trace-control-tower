name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  UV_VERSION: "0.5.0"
  REGISTRY: ${{ secrets.ECR_REGISTRY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ── Secrets required (GitHub repo Settings → Secrets) ──────────────────────
# ECR_REGISTRY      — e.g. 123456789.dkr.ecr.eu-west-1.amazonaws.com
# AWS_REGION        — e.g. eu-west-1
# AWS_CI_ROLE_ARN   — IAM role with ECR push + S3 write (OIDC)
# COMPLIANCE_EVIDENCE_BUCKET — S3 bucket for SBOM / evidence

jobs:
  # ── 1. BACKEND: lint + test ────────────────────────────────────────────────
  backend-test:
    name: "backend: ruff + mypy + pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - run: uv sync --all-extras

      - name: ruff lint
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: pytest + coverage
        run: uv run pytest tests/ -v --tb=short

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage.xml

  # ── 2. FRONTEND: typecheck + build ────────────────────────────────────────
  frontend-test:
    name: "frontend: tsc + vite build + playwright"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Vite build
        run: npm run build

      - name: Playwright install
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Playwright e2e
        run: npm run test:e2e
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/

  # ── 3. REGULATORY MCP: tsc + vitest ──────────────────────────────────────
  regulatory-mcp-test:
    name: "regulatory-mcp: tsc + vitest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcps/regulatory_mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcps/regulatory_mcp/package-lock.json

      - run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: vitest
        run: npm test

  # ── 4. SAST + SECRETS (free tools, no external server needed) ────────────
  sast:
    name: "sast: semgrep + bandit + gitleaks + trufflehog"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python p/owasp-top-ten p/fastapi p/secrets

      - name: Bandit
        run: |
          pip install bandit
          bandit -r apps/backend/src/ -ll -f json -o bandit-report.json || true
          bandit -r apps/backend/src/ -ll

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── 4. BUILD + PUSH → ECR (main branch only) ─────────────────────────────
  build:
    name: "build: docker → ECR (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, regulatory-mcp-test, sast]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, frontend]
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git.commit=${{ github.sha }}
            git.branch=${{ github.ref_name }}

      - name: Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

      - name: SBOM → S3
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json

      - run: |
          aws s3 cp sbom-${{ matrix.service }}.cdx.json \
            s3://${{ secrets.COMPLIANCE_EVIDENCE_BUCKET }}/sbom/${{ github.sha }}/sbom-${{ matrix.service }}.cdx.json \
            --no-progress

  # ── 5. DEPLOY → prod EC2 via Docker Compose ───────────────────────────────
  deploy:
    name: "deploy: prod EC2 (docker compose up)"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod
      url: https://${{ vars.DOMAIN }}
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "/opt/rwa/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/rwa

            # Store previous tag for rollback
            grep IMAGE_TAG .env | cut -d= -f2 > /tmp/prev-image-tag || true

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Update image tag
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ github.sha }}|" .env

            # Pull new images (before stopping old ones)
            docker compose -f docker-compose.prod.yml pull

            # Rolling update
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health
            echo "Waiting for backend..."
            for i in $(seq 1 18); do
              if docker compose -f docker-compose.prod.yml exec -T backend \
                  curl -sf http://localhost:8000/v1/health > /dev/null 2>&1; then
                echo "Healthy at attempt ${i}"
                break
              fi
              [ "$i" -eq 18 ] && { echo "Health check failed"; exit 1; }
              sleep 10
            done

            echo "Deploy OK: ${{ github.sha }}"

      - name: Smoke test via public URL
        run: |
          sleep 5
          curl -f --retry 5 --retry-delay 5 \
            https://${{ secrets.DOMAIN }}/api/v1/health

      - name: Upload deploy evidence → S3
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          echo "{\"timestamp\":\"${TS}\",\"sha\":\"${{ github.sha }}\",\"actor\":\"${{ github.actor }}\",\"status\":\"${{ job.status }}\"}" \
            | aws s3 cp - \
                s3://${{ secrets.COMPLIANCE_EVIDENCE_BUCKET }}/deployments/prod/${TS}.json \
                --no-progress
        if: always()

  # ── ROLLBACK (manual, on failure) ─────────────────────────────────────────
  rollback:
    name: "rollback: restore previous image tag"
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/rwa
            PREV=$(cat /tmp/prev-image-tag 2>/dev/null || echo "")
            if [ -n "${PREV}" ]; then
              echo "Rolling back to ${PREV}"
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${PREV}|" .env
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              echo "Rollback complete: ${PREV}"
            else
              echo "No previous tag found — manual intervention required"
              exit 1
            fi
