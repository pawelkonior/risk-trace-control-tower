name: Regulatory MCP CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop, 'RCT-*']
    paths:
      - 'mcps/regulatory_mcp/**'
      - '.github/workflows/regulatory-mcp-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mcps/regulatory_mcp/**'
      - '.github/workflows/regulatory-mcp-ci.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcps/regulatory_mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcps/regulatory_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: |
          set -o pipefail
          npm run build 2>&1 | tee regulatory-mcp-build.log

      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee regulatory-mcp-test.log

      - name: Check for build artifacts
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.js" ]; then
            echo "Error: build/index.js not found"
            exit 1
          fi
          echo "Build artifacts verified"

      - name: Upload build and test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regulatory-mcp-build-test-evidence
          path: |
            mcps/regulatory_mcp/regulatory-mcp-build.log
            mcps/regulatory_mcp/regulatory-mcp-test.log
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: mcps/regulatory_mcp
          push: false
          tags: bank-regulatory-controls-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm bank-regulatory-controls-mcp:ci node --version
          echo "Docker image verified"

  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: always()

    steps:
      - name: Check quality gate status
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "❌ Build and test failed"
            exit 1
          fi
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All quality gates passed"
          echo "✅ Build: SUCCESS"
          echo "✅ Tests: SUCCESS"
          echo "✅ Docker: SUCCESS"
          {
            echo "## Regulatory MCP CI Evidence"
            echo ""
            echo "- Build and test: ${{ needs.build-and-test.result }}"
            echo "- Docker build: ${{ needs.docker-build.result }}"
            echo "- Evidence artifact: regulatory-mcp-build-test-evidence"
          } >> "$GITHUB_STEP_SUMMARY"

