name: Deploy — staging

on:
  workflow_run:
    workflows: ["Deploy — dev"]
    types: [completed]

env:
  ENVIRONMENT: staging
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: rwa-control-tower-staging
  NAMESPACE: rwa-staging
  REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Helm dependency update
        run: helm dependency update infra/helm/rwa-platform

      - name: Helm upgrade — staging
        run: |
          helm upgrade --install rwa-platform infra/helm/rwa-platform \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/helm/rwa-platform/values.yaml \
            --values infra/helm/rwa-platform/values-staging.yaml \
            --set global.registry=${{ env.REGISTRY }} \
            --set global.imageTag=${{ github.event.workflow_run.head_sha }} \
            --timeout 10m \
            --wait

      - name: Verify backend health
        run: |
          kubectl rollout status deployment/rwa-platform-rwa-backend \
            -n ${{ env.NAMESPACE }} --timeout=5m
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:8 \
            -n ${{ env.NAMESPACE }} \
            -- curl -f http://rwa-platform-rwa-backend:8000/v1/health

      - name: Smoke test — RWA calculation endpoint
        run: |
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:8 \
            -n ${{ env.NAMESPACE }} \
            -- curl -f -s -o /dev/null -w "%{http_code}" \
               http://rwa-platform-rwa-backend:8000/v1/health
