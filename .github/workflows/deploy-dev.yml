name: Deploy — dev

on:
  push:
    branches: [main]

env:
  ENVIRONMENT: dev
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: rwa-control-tower-dev
  NAMESPACE: rwa-dev
  REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Helm dependency update
        run: helm dependency update infra/helm/rwa-platform

      - name: Helm upgrade — dev
        run: |
          helm upgrade --install rwa-platform infra/helm/rwa-platform \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infra/helm/rwa-platform/values.yaml \
            --values infra/helm/rwa-platform/values-dev.yaml \
            --set global.registry=${{ env.REGISTRY }} \
            --set global.imageTag=${{ github.sha }} \
            --timeout 10m \
            --wait

      - name: Verify backend health
        run: |
          kubectl rollout status deployment/rwa-platform-rwa-backend \
            -n ${{ env.NAMESPACE }} --timeout=5m
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:8 \
            -n ${{ env.NAMESPACE }} \
            -- curl -f http://rwa-platform-rwa-backend:8000/v1/health

      - name: Verify frontend health
        run: |
          kubectl rollout status deployment/rwa-platform-rwa-frontend \
            -n ${{ env.NAMESPACE }} --timeout=5m
