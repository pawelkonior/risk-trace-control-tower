# ExternalSecret: backend-secrets (rwa-prod)
# Syncs from AWS Secrets Manager → Kubernetes Secret "backend-secrets"
# refreshInterval: 1h — secret rotation picked up within 1 hour
# creationPolicy: Owner — fails loudly if AWS secret not found
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: rwa-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
  - secretKey: RWA_DATABASE_URL
    remoteRef:
      key: /rwa/prod/database-url
      property: RWA_DATABASE_URL  # NOT DATABASE_URL
  - secretKey: REDIS_URL
    remoteRef:
      key: /rwa/prod/redis-url
      property: REDIS_URL
  - secretKey: KAFKA_USERNAME
    remoteRef:
      key: AmazonMSK_rwa-prod-rwa-backend
      property: username
  - secretKey: KAFKA_PASSWORD
    remoteRef:
      key: AmazonMSK_rwa-prod-rwa-backend
      property: password
---
