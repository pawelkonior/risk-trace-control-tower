services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rwa_steering}
      POSTGRES_USER: ${POSTGRES_USER:-rwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rwa_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    image: rwa-steering-backend:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RWA_ENV: ${RWA_ENV:-docker}
      RWA_LOG_LEVEL: ${RWA_LOG_LEVEL:-INFO}
      RWA_CORS_ORIGINS: ${RWA_CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:5173,http://localhost:5173}
      RWA_DATABASE_URL: ${RWA_DATABASE_URL:-postgresql+psycopg://rwa:rwa_local_password@postgres:5432/rwa_steering}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_RWA_API_BASE_URL: ${VITE_RWA_API_BASE_URL:-/api}
    image: rwa-steering-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
